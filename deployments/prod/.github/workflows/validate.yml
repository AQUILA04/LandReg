name: Validate IaC

on:
  pull_request:
    paths:
      - 'deployments/prod/**'
  push:
    branches: [main]
    paths:
      - 'deployments/prod/**'

jobs:
  terraform-validation:
    name: Terraform Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: true

      - name: Terraform Format Check
        id: fmt
        run: |
          cd deployments/prod/terraform
          terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          cd deployments/prod/terraform
          terraform init -backend=false -upgrade

      - name: Terraform Validate
        id: validate
        run: |
          cd deployments/prod/terraform
          terraform validate

  kubernetes-yaml-validation:
    name: Kubernetes YAML Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install yamllint
        run: pip install yamllint

      - name: Lint Kubernetes YAML files
        run: |
          yamllint -d relaxed deployments/prod/k8s/

      - name: Install kubeval
        run: |
          curl -sL https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz | tar xz
          sudo mv kubeval /usr/local/bin/

      - name: Validate Kubernetes manifests
        run: |
          for f in deployments/prod/k8s/*.yaml; do
            kubeval --strict "$f" || true
          done

  helm-chart-validation:
    name: Helm Chart Values Validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v3
        with:
          version: '3.14.0'

      - name: Configure Helm repositories
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo add elastic https://helm.elastic.co
          helm repo update

      - name: Lint Helm values
        run: |
          for f in deployments/prod/helm-values/*.yaml; do
            echo "Linting $f"
            helm lint --quiet . 2>/dev/null || echo "Note: Chart linting requires chart structure"
          done

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'deployments/prod'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
