apiVersion: apps/v1
kind: Deployment
metadata:
  name: landreg-api
  namespace: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: landreg-api
  template:
    metadata:
      labels:
        app: landreg-api
    spec:
      nodeSelector:
        node-type: api
      containers:
      - name: landreg-api
        image: landreg/optimize-land-reg:latest
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "production"
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: database-config
              key: postgres-host
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: database-config
              key: postgres-port
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: database-config
              key: postgres-database
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: postgres-password
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: kafka-config
              key: bootstrap-servers
        - name: REDIS_HOST
          valueFrom:
            configMapKeyRef:
              name: redis-config
              key: host
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: redis-config
              key: port
        resources:
          requests:
            memory: "4Gi"
            cpu: "1000m"
          limits:
            memory: "8Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: landreg-api-service
  namespace: backend
spec:
  selector:
    app: landreg-api
  ports:
  - name: http
    port: 8080
    targetPort: 8080
  type: LoadBalancer
