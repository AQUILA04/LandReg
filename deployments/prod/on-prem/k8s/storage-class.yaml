# Storage Class Configuration
# ============================================
# DEFAULT: local-path-provisioner
# - Fonctionne sans infrastructure externe
# - Ideal pour développement et petites installations
# - Stocke les données sur le disque local du node
#
# ALTERNATIVES (voir section en bas):
# - NFS (nfs-subdir-external-provisioner)
# - Ceph (rook-ceph)
# - Longhorn
# ============================================

apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: standard
  annotations:
    storageclass.kubernetes.io/is-default-class: "true"
provisioner: rancher.io/local-path
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: fast
provisioner: rancher.io/local-path
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
---
