apiVersion: apps/v1
kind: Deployment
metadata:
  name: afis-master
  namespace: afis
spec:
  replicas: 2
  selector:
    matchLabels:
      app: afis-master
  template:
    metadata:
      labels:
        app: afis-master
    spec:
      nodeSelector:
        node-type: afis-master
      containers:
      - name: afis-master
        image: landreg/afis-master:latest
        ports:
        - containerPort: 8081
          name: http
        env:
        - name: SPRING_PROFILES_ACTIVE
          value: "production"
        - name: MONGODB_HOST
          valueFrom:
            configMapKeyRef:
              name: mongodb-config
              key: host
        - name: MONGODB_PORT
          valueFrom:
            configMapKeyRef:
              name: mongodb-config
              key: port
        - name: MONGODB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-secrets
              key: mongodb-password
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: kafka-config
              key: bootstrap-servers
        resources:
          requests:
            memory: "8Gi"
            cpu: "2000m"
          limits:
            memory: "16Gi"
            cpu: "4000m"
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8081
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /actuator/health/readiness
            port: 8081
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: afis-master-service
  namespace: afis
spec:
  selector:
    app: afis-master
  ports:
  - name: http
    port: 8081
    targetPort: 8081
  type: ClusterIP
