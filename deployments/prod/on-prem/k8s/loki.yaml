# Logging Stack - Grafana Loki
# ============================================
# DEFAULT: Loki + Promtail (via Helm)
# - Plus léger que ELK (Elasticsearch, Logstash, Kibana)
# - Intégration native avec Grafana
# - Stockage dans S3/MinIO ou local
# - Indexation par labels (pas par texte complet)
#
# ALTERNATIVES:
# - ELK Stack (elasticsearch, logstash, kibana)
# - EFK (Elasticsearch, Fluentd, Kibana)
# - Jaeger (traces distribuées uniquement)
# ============================================

apiVersion: v1
kind: Namespace
metadata:
  name: logging
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: logging
data:
  config.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
    
    common:
      path_prefix: /var/loki
      storage:
        filesystem:
          chunks_directory: /var/loki/chunks
          rules_directory: /var/loki/rules
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory
    
    schema_config:
      configs:
        - from: 2023-01-01
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
    
    limits_config:
      reject_old_samples: true
      reject_old_samples_max_age: 168h
