# TYPE  DATABASE        USER            ADDRESS                 METHOD

# Autoriser l'accès local avec md5 (mot de passe chiffré)
local   all             all                                     peer

# Autoriser localhost avec md5
host    all             all             127.0.0.1/32            md5
host    all             all             ::1/128                 md5

# Autoriser tout le réseau local (ex: 192.168.1.0/24) avec md5
host    all             all             192.168.1.0/24          md5

# Rejeter les connexions externes par défaut (optionnel mais recommandé)
host    all             all             0.0.0.0/0               reject
