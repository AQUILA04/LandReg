# PostgreSQL Configuration File (postgresql.conf)

# ---- Memory Settings ----
shared_buffers = 256MB                # Memory allocated for caching (approx. 25% of RAM)
work_mem = 16MB                       # Memory per sort operation
maintenance_work_mem = 64MB           # Memory for maintenance tasks (e.g., vacuum)

effective_cache_size = 768MB          # Memory available for disk caching (approx. 50-75% of total RAM)

# ---- Logging Settings ----
logging_collector = on                # Enable logging to files
log_directory = '/var/log/postgresql' # Directory for log files
log_filename = 'postgresql.log'       # Log file name
log_statement = 'all'                 # Log all SQL statements
log_min_duration_statement = 500      # Log queries longer than 500 ms
log_connections = on                  # Log each successful connection
log_disconnections = on               # Log each disconnection
log_lock_waits = on                   # Log when a query waits for a lock
log_checkpoints = on                  # Log checkpoint operations
log_autovacuum_min_duration = 500     # Log autovacuum tasks longer than 500 ms

# ---- Connections and Authentication ----
listen_addresses = '*'                # Listen on all interfaces
max_connections = 100                 # Maximum number of concurrent connections

# ---- Parallelism ----
max_parallel_workers_per_gather = 4   # Workers for parallel queries
parallel_setup_cost = 1000            # Cost threshold for parallel setup
parallel_tuple_cost = 0.1             # Cost per tuple for parallel processing

# ---- WAL (Write-Ahead Logging) ----
wal_level = replica                   # WAL level for backups and replication
synchronous_commit = on               # Ensure data is safely written to disk
checkpoint_timeout = 10min            # Checkpoint frequency
checkpoint_completion_target = 0.9    # Target time for checkpoint completion

# ---- Autovacuum ----
autovacuum = on                       # Enable autovacuum
autovacuum_max_workers = 3            # Number of autovacuum workers
log_autovacuum_min_duration = 500     # Log autovacuum tasks longer than 500 ms

# ---- Performance Tuning ----
effective_io_concurrency = 2          # Disk I/O concurrency (adjust for SSDs/HDDs)
random_page_cost = 1.1                # Cost of random I/O operations (lower for SSDs)
seq_page_cost = 1.0                   # Cost of sequential I/O operations

# ---- Custom Settings ----
deadlock_timeout = 1s                 # Timeout for deadlock detection
idle_in_transaction_session_timeout = 10min # Terminate idle transactions after timeout

# ---- Default Text Search ----
default_text_search_config = 'pg_catalog.english'
